<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../style/order.css">
</head>

<body class="w-100 h-auto p-2">
    <nav class="navbar bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQR9ShIXButbW77uLrZedWHQbxvgbPdKZ5BxNZgClGIMQ&s=10"
                    alt="Bootstrap" width="80" height="80">
            </a>
            <div class="icon">
                <i class="fa-brands fa-facebook" id="icon1"></i>
                <i class="fa-brands fa-telegram" id="icon1"></i>
                <i class="fa-solid fa-phone" id="icon1"></i>
            </div>
        </div>
    </nav>

    <div class="container_1">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSffmgbUElNm3gUn6nh6gujLMPesCj4ffDxC3E2eUT6sg&s=10"
            alt="">
        <div class="overlay">
            <p>Review Your Order</p>
        </div>
    </div>

    <form>
        <div class="box1 mb-3">
            <label for="fullname" class="form-label">Full name</label>
            <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
        </div>
        <div class="box1 mb-3">
            <label for="phonenumber" class="form-label mt-3">Phone number</label>
            <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
        </div>
        <div class="box1 mb-3">
            <label for="enterorder" class="form-label mt-3">Enter Order</label>
            <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
        </div>
        <div class="box1 mb-3">
            <label for="deliveryaddress" class="form-label mt-3">Delivery Address</label>
            <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
        </div>
        <div class="box1 mb-3 form-check ">
            <input type="checkbox" class="form-check-input" id="exampleCheck1">
            <label class="form-check-label" for="exampleCheck1">Agree</label>
        </div>
        <button type="submit" class="butt btn btn-primary d-grid gap-2 col-6 mx-auto">Submit</button>
    </form>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</html>
