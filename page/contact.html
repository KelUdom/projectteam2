<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact us </title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
   <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: rgb(245, 245, 245);
    font-family: Arial, sans-serif;
}

.container-section {
    padding: 60px 0;
}

.contact-card {
    background: rgb(255, 255, 255);
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
}

.contact-card h3 {
    color: rgb(13, 110, 253);
}

.form-control {
    border-radius: 8px;
    padding: 12px;
    border: 1px solid rgb(206, 212, 218);
}

.form-control:focus {
    border-color: rgb(13, 110, 253);
    box-shadow: 0 0 8px rgba(13, 110, 253, 0.3);
}
textarea {
    resize: none;
}

.navbar-brand {
  font-size: 2rem;
  color: black;
}
body {
  background-color: rgb(255, 255, 255);
}
.navbar-brand img {
  width: 100px;
  height: 100px;
  border: none;
  border-radius: 50%;
}

.navbar-brand:hover {
  color: black;
}
.nav-link {
  margin-left: 10px;
  margin-right: 10px;

  color: black;
  text-transform: uppercase;
}
.nav-link:hover {
  color: rgb(224, 255, 255);
  background: blue;
  border: none;
  border-radius: 20px;
}
.search {
  height: 40px;
  width: 80%;
  border-radius: 60px;
  margin-right: -35px;
  outline: none;
  border: 2px solid rgb(134, 109, 83);
}
.btn0 {
  height: 40px;
  width: 40%;
  outline: none;
  border: none;
  background: rgb(134, 109, 83);
  color: white;
  font-weight: 700;
  border-radius: 60px;
}
.btn-primary {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.3s;
}

.btn-primary:hover {
    transform: translateY(-2px);
}
.contact-card iframe {
    width: 100%;
    height: 100%;
    min-height: 500px;
    border: 0;
}


@media (max-width: 991px) {
    .contact-card iframe {
        min-height: 350px;
    }
}

@media (max-width: 576px) {
    .container-section {
        padding: 30px 15px;
    }

    .contact-card {
        border-radius: 10px;
    }

    .contact-card iframe {
        min-height: 300px;
    }

    .btn-primary {
        padding: 10px;
    }
}
   </style>
  <body>
    <section>
     <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container">
        <a class="navbar-brand" href="#">
          <img
            src="https://img.magnific.com/premium-vector/minimal-coffee-logo-coffee-logo-round-shape_611881-896.jpg?semt=ais_hybrid&w=740&q=80"
            alt=""
        /></a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav m-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="./index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#about">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./page/contact.html"> Contact </a>
            </li>
            <li class="nav-item">
              <a class="nav-link">Sevice</a>
            </li>
          </ul>
          <form class="d-flex" role="search">
            <input
              class="px-2 search"
              type="search"
              placeholder="Search"
              aria-label="Search"
            />
            <button class="btn0" type="submit">Search</button>
          </form>
        </div>
      </div>
    </nav>
    <div class="container-section py-5 mt-3">
      <div class="container">
        <div class="row g-0 contact-card bg-white rounded-3 overflow-hidden">
          <div class="col-lg-6 p-4 p-md-5">
            <h3 class="mb-4 fw-bold text-primary">Contact Us</h3>
            <form>
              <div class="mb-3">
                <label class="form-label fw-semibold"> Full Name </label>
                <input
                  type="text"
                  class="form-control"
                  required
                  placeholder="Enter your Name"
                />
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold"> Email Address </label>
                <input
                  type="email"
                  class="form-control"
                  required
                  placeholder="Enter your Email"
                />
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold"> Message </label>
                <textarea
                  class="form-control"
                  rows="4"
                  placeholder="Write your Message..."
                ></textarea>
              </div>
              <button class="btn btn-primary">Send Message</button>
            </form>
          </div>
          <div class="col-lg-6">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d250151.42198261587!2d104.89018675!3d11.57936425!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3109513dc76a6be3%3A0x9c010ee85ab525bb!2sPhnom%20Penh!5e0!3m2!1sen!2skh!4v1782874900874!5m2!1sen!2skh"
              width="600"
              height="450"
              style="border: 0"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="strict-origin-when-cross-origin"
            ></iframe>
          </div>
        </div>
      </div>
    </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
